  prediction: velocity
  loss_weight: null
  sample_eps: null
  train_eps: null
  use_cosine_loss: false
  use_lognorm: true
  use_jit: true

sample:
  mode: ODE
  sampling_method: euler
  atol: 0.000001
  rtol: 0.0005
  reverse: false
  num_sampling_steps: 50
  cfg_scale: 1.0
