  use_coord_encoding: true
  version: 3
  pe_freq: 20
  mixed_precision:
  use_dit_like_pe: false
  face_cond: true
  face_bin: 20

train:
  max_steps: 751000
  global_batch_size: 16
  output_dir: '/data1/sunqi/MeshFlow2/output'
  exp_name: 'continue-x1-75k-to-76k'
  resume: true
  log_every: 100
  ckpt_every: 1000

