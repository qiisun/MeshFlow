ckpt_path: '/data1/sunqi/MeshFlow2/output/continue-x1-75k-to-76k/checkpoints/00760000.pt'

data:
  data_path: '/data1/sunqi/MeshFlow2/downloaded_data/ss_overfit'
  num_workers: 4
  noise_sort: 'random'
  use_rot_aug: false
  use_scale_aug: false
  use_permute_aug: true

model:
  model_type: 'equidit'
  use_rmsnorm: true
  hidden_dim: 768
