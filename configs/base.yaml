# we recommend to read config_details.yaml first.


ckpt_path: 'path/to/your/checkpoint.pt' # <---- download our pre-trained lightningdit or your own checkpoint

data:
  valid_path: 'debug/valid'
  data_path: './downloaded_data/dummy'  # <---- path to your data. it is generated by extract_features.py.
                                                #       if you just want to inference, download our latent_status.safetensors and give its folder path here is ok.
                                                #       the path should be like this:
                                                #       imagenet_train_256/
                                                #         ├── latents_rank00_shard000.safetensors (not required for inference)
                                                #         ├── latents_rank00_shard001.safetensors (not required for inference)
                                                #         ├── ...
                                                #         └── latents_stats.pt
  fid_reference_file: 'path/to/your/VIRTUAL_imagenet256_labeled.npz' # <---- path to your fid_reference_file.npz. download it from ADM

  # recommend to use default settings
  image_size: 256
  num_classes: 1000
  num_workers: 8
  latent_norm: true
  latent_multiplier: 1.0

  do_dataset_normalize: True
  noise_sort: 'ot'
  use_rot_aug: False  # <---- whether to use rotation augmentation when training
  use_scale_aug: False  # <---- whether to use scaling augmentation when training


# recommend to use default settings (we wil release codes with SD-VAE later)
# vae:
#   model_name: 'vavae_f16d32'
#   downsample_ratio: 16

# recommend to use default settings
model:
  model_type: "equidit"
  use_qknorm: false
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  wo_shift: false
  # in_chans: 32

  hidden_dim: 768
  num_heads: 12
  max_length: 800
  input_dim: 9
  num_layers: 12
  gradient_checkpointing: False
  use_coord_encoding: True
  version: 3
  pe_freq: 20
  mixed_precision:
  use_dit_like_pe: False
  face_cond: True
  face_bin: 10

# recommend to use default settings
train:
  max_steps: 400000
  global_batch_size: 16
  global_seed: 0
  output_dir: 'output'
  exp_name: 'base' # <---- experiment name, set as you like
  ckpt: null
  log_every: 100
  ckpt_every: 10000 # 100 for debug

  use_repa: True
  repa_idx: 3
  
optimizer:
  lr: 0.0002
  beta2: 0.95
  
# recommend to use default settings
transport:
  path_type: Linear
  prediction: velocity
  loss_weight: null
  sample_eps: null
  train_eps: null
  use_cosine_loss: true
  use_lognorm: true
  use_jit: false

# recommend to use default settings
sample:
  mode: ODE
  sampling_method: euler
  atol: 0.000001
  rtol: 0.001
  reverse: false
  likelihood: false
  num_sampling_steps: 50
  cfg_scale: 10.0 # <---- cfg scale, for 800 epoch performance with FID=1.35 cfg_scale=6.7
                  #       for 64 epoch performance with FID=2.11 cfg_scale=10.0
                  #       you may find we use a large cfg_scale, this is because of 2 reasons:
                  #       we find a high-dimensional latent space requires a large cfg_scale to get good performance than f8d4 SD-VAE
                  #       we enable cfg interval, which reduces the negative effects of large cfg on high-noise parts. This means larger cfg can be utilized
  
  # recommend to use default settings
  per_proc_batch_size: 4
  fid_num: 50000
  cfg_interval_start: 0.11
  timestep_shift: 0.3