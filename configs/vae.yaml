# we recommend to read config_details.yaml first.


ckpt_path: 'path/to/your/checkpoint.pt' # <---- download our pre-trained lightningdit or your own checkpoint

data:
  valid_path: 'debug/valid'
  data_path: 'all'

  # recommend to use default settings
  num_workers: 8
  latent_norm: true
  latent_multiplier: 1.0

  do_dataset_normalize: True
  noise_sort: 'ot'
  max_length: 800

  num_bins: 256  # quantize final results
  use_rot_aug: True  # <---- whether to use rotation augmentation when training
  use_scale_aug: True  # <---- whether to use scaling augmentation when training


# recommend to use default settings
model:
  model_type: "equidit"
  use_qknorm: false
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  wo_shift: false
  latent_channels: 3

  # in_chans: 32

  hidden_dim: 768
  num_heads: 12
  max_length: 800
  input_dim: 9
  num_layers: 12
  gradient_checkpointing: False
  use_coord_encoding: True
  version: 3
  pe_freq: 20
  mixed_precision:
  use_dit_like_pe: False
  face_cond: True
  face_bin: 10
  decoder_type: "reg"


# recommend to use default settings
train:
  max_steps: 400000
  global_batch_size: 384
  global_seed: 0
  output_dir: 'output'
  exp_name: 'vae_full' # <---- experiment name, set as you like
  ckpt: null
  log_every: 100
  ckpt_every: 10000 # 100 for debug
  kl_weight: 0.00001 # <---- 1e-6
  resume: True
  
optimizer:
  lr: 0.00002 # 2e-5
  beta2: 0.95